<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
    <script
      src="https://kit.fontawesome.com/646d72fec0.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="css/style.css" />
    <title>index</title>
  </head>
  <body>
    <div class="container mt-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Hôm nay</h3>
        <div>
          <a
            href="#"
            data-bs-toggle="modal"
            data-bs-target="#taskModal"
            class="me-3"
          >
            <i class="fa-solid fa-plus"></i> Thêm công việc
          </a>
          <button onclick="saveTasksToFile()" class="btn btn-success btn-sm">
            Lưu file danh sách công việc
          </button>
        </div>
      </div>
      <ul id="taskList"></ul>
    </div>

    <ul id="taskList"></ul>

    <!-- Popup Modal -->
    <div
      class="modal fade"
      id="taskModal"
      tabindex="-1"
      aria-labelledby="taskModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="taskModalLabel">Thêm Công Việc</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <!-- Nội dung công việc -->
            <input
              type="text"
              id="taskInput"
              class="form-control mb-3"
              placeholder="Nhập công việc..."
            />
            <!-- Hẹn ngày giờ -->
            <input
              type="datetime-local"
              id="taskDateTime"
              class="form-control"
            />
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Hủy
            </button>
            <button type="button" class="btn btn-primary" onclick="addTask()">
              Thêm
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
